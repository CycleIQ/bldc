name: Firmware

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  ARM_TOOLCHAIN_DIR: tools/gcc-arm-none-eabi-7-2018-q2-update

jobs:
  release-firmware:
    name: Build and upload release firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive
          ssh-key: ${{ secrets.CYCLEIQ_PROTOCOL_DEPLOY_KEY }}

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bzip2 git make python3 unzip wget

      - name: Cache ARM GCC
        id: cache-arm-gcc
        uses: actions/cache@v4
        with:
          path: ${{ env.ARM_TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-gcc-arm-none-eabi-7-2018-q2-update

      - name: Install ARM GCC
        if: steps.cache-arm-gcc.outputs.cache-hit != 'true'
        run: make arm_sdk_install

      - name: Show ARM GCC version
        run: ${{ env.ARM_TOOLCHAIN_DIR }}/bin/arm-none-eabi-gcc --version

      - name: Build firmware
        run: |
          make cycleiq_mini
          make cycleiq_75_100

      - name: Prepare release assets
        run: |
          set -euo pipefail

          tag="${{ github.event.release.tag_name }}"
          mkdir -p release

          cp build/cycleiq_mini/cycleiq_mini.bin "release/cycleiq_mini-${tag}.bin"
          cp build/cycleiq_75_100/cycleiq_75_100.bin "release/cycleiq_75_100-${tag}.bin"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            release/*.bin \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
